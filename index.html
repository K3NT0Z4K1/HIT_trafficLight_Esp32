<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrafficSim — ESP32 Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030712;
      color: #e5e7eb;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 22px;
      background: #0d1117;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }
    .logo { font-size: 1.35rem; font-weight: 700; }
    .header-title {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 13px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid;
      transition: all 0.3s;
    }
    .badge.live    { background:rgba(34,197,94,0.1);  color:#22c55e; border-color:rgba(34,197,94,0.3); }
    .badge.offline { background:rgba(239,68,68,0.1);  color:#ef4444; border-color:rgba(239,68,68,0.3); }
    .pulse-dot {
      width:7px; height:7px;
      border-radius:50%;
      background:currentColor;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.8); }
    }

    /* CONTENT */
    .content {
      display: flex;
      flex: 1;
      gap: 18px;
      padding: 18px;
      overflow: hidden;
      align-items: flex-start;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 0 1px #1f2937, 0 8px 40px rgba(0,0,0,0.6);
      flex-shrink: 0;
      display: block;
    }

    /* PANEL */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 11px;
      overflow-y: auto;
      max-width: 270px;
    }
    .panel::-webkit-scrollbar { width:4px; }
    .panel::-webkit-scrollbar-thumb { background:#374151; border-radius:2px; }

    .light-card {
      border-radius: 12px;
      border: 2px solid;
      padding: 18px 14px 14px;
      text-align: center;
      transition: background 0.4s, border-color 0.4s;
    }
    .light-emoji { font-size:2.2rem; line-height:1; margin-bottom:2px; }
    .light-label { font-size:1.9rem; font-weight:700; letter-spacing:0.12em; line-height:1.1; transition:color 0.3s; }
    .light-sub   { font-size:0.78rem; color:#6b7280; margin-top:5px; letter-spacing:0.04em; }

    .info-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .info-box {
      background:#0d1117;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:11px;
      text-align:center;
    }
    .info-label { font-size:0.68rem; color:#6b7280; text-transform:uppercase; letter-spacing:0.09em; margin-bottom:3px; }
    .info-val   { font-size:1.6rem; font-weight:700; font-family:'JetBrains Mono',monospace; line-height:1.1; }
    .unit       { font-size:0.95rem; color:#6b7280; margin-left:1px; font-weight:400; }

    .update-box {
      background:#0d1117;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:11px;
    }
    .update-val { font-family:'JetBrains Mono',monospace; font-size:0.73rem; color:#9ca3af; margin-top:4px; word-break:break-all; }

    .section-box {
      background:#0d1117;
      border:1px solid #1f2937;
      border-radius:10px;
      padding:13px;
    }
    .section-title { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:#4b5563; margin-bottom:9px; font-weight:600; }

    .log-empty { font-size:0.78rem; color:#374151; text-align:center; padding:6px 0; font-style:italic; }
    .log-entry {
      display:flex; align-items:center; gap:7px;
      padding:5px 0;
      font-size:0.78rem;
      font-family:'JetBrains Mono',monospace;
      border-bottom:1px solid #111827;
    }
    .log-entry:last-child { border-bottom:none; }
    .log-time  { color:#6b7280; flex:1; font-size:0.72rem; }
    .log-state { font-weight:600; font-size:0.75rem; }
    .log-entry.red    .log-state { color:#ef4444; }
    .log-entry.yellow .log-state { color:#f59e0b; }
    .log-entry.green  .log-state { color:#22c55e; }

    .dot {
      width:8px; height:8px;
      border-radius:50%;
      display:inline-block;
      flex-shrink:0;
    }
    .dot.red    { background:#ef4444; box-shadow:0 0 6px #ef4444aa; }
    .dot.yellow { background:#f59e0b; box-shadow:0 0 6px #f59e0baa; }
    .dot.green  { background:#22c55e; box-shadow:0 0 6px #22c55eaa; }

    .legend-item { display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#9ca3af; padding:4px 0; }

    @media (max-width:820px) {
      body { overflow:auto; }
      .content { flex-direction:column; overflow:visible; }
      canvas { width:100%; height:auto; }
      .panel { max-width:100%; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🚦 TrafficSim</span>
  <span class="header-title">ESP32 Traffic Light Monitor</span>
  <span class="badge offline" id="badge">
    <span class="pulse-dot"></span>
    <span id="badge-text">CONNECTING...</span>
  </span>
</header>

<div class="content">
  <canvas id="sim" width="560" height="560"></canvas>

  <div class="panel">
    <div class="light-card" id="light-card" style="background:#1a0505; border-color:#ef4444;">
      <div class="light-emoji" id="light-emoji">🔴</div>
      <div class="light-label" id="light-label" style="color:#ef4444;">RED</div>
      <div class="light-sub">North ↕ South</div>
    </div>

    <div class="info-row">
      <div class="info-box">
        <div class="info-label">Duration</div>
        <div class="info-val"><span id="time-left">--</span><span class="unit">s</span></div>
      </div>
      <div class="info-box">
        <div class="info-label">Direction</div>
        <div class="info-val" style="font-size:1.2rem">N ↕ S</div>
      </div>
    </div>

    <div class="update-box">
      <div class="info-label">Last Firebase Update</div>
      <div class="update-val" id="updated-at">Connecting to Firebase...</div>
    </div>

    <div class="section-box">
      <div class="section-title">Change Log</div>
      <div id="log-list">
        <div class="log-empty">Waiting for light changes...</div>
      </div>
    </div>

    <div class="section-box">
      <div class="section-title">Legend</div>
      <div class="legend-item"><span class="dot red"></span> Red — Cars stop</div>
      <div class="legend-item"><span class="dot yellow"></span> Yellow — Slow down</div>
      <div class="legend-item"><span class="dot green"></span> Green — Cars move</div>
    </div>
  </div>
</div>

<!-- Firebase CDN — no npm or installation needed! -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ============================================================
   FIREBASE INIT
============================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyC6r5kNnapVhrzPQ-vA_Xm6pZRm6HQ3N7U",
  authDomain:        "traffic-sim-5a9ef.firebaseapp.com",
  databaseURL:       "https://traffic-sim-5a9ef-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "traffic-sim-5a9ef",
  storageBucket:     "traffic-sim-5a9ef.firebasestorage.app",
  messagingSenderId: "511074874213",
  appId:             "1:511074874213:web:a6b727744263d6b9be278c"
};

firebase.initializeApp(firebaseConfig);
const db       = firebase.database();
const lightRef = db.ref('traffic_light/status'); // path in your Firebase DB

/* ============================================================
   CANVAS CONSTANTS
============================================================ */
const W = 560, H = 560;
const CX = W/2, CY = H/2;
const ROAD_HALF  = 52;
const LANE_W     = 52;
const SIDEWALK   = 10;
const SOUTH_STOP = CY - ROAD_HALF;
const NORTH_STOP = CY + ROAD_HALF;
const CAR_W = 22, CAR_H = 38, CAR_GAP = 8;
const CAR_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];

let currentLight = 'red';
let logEntries   = [];

/* ============================================================
   CAR CLASS
============================================================ */
class Car {
  constructor(direction, index) {
    this.direction = direction;
    this.color     = CAR_COLORS[index % CAR_COLORS.length];
    this.speed     = 1.6 + index * 0.12;
    this.stopped   = false;
    if (direction === 'south') {
      this.x = CX - LANE_W * 0.5;
      this.y = -50 - index * 175;
    } else {
      this.x = CX + LANE_W * 0.5;
      this.y = H + 50 + index * 175;
    }
  }

  update(light, frontEdgeY) {
    const shouldStop = light === 'red' || light === 'yellow';
    if (this.direction === 'south') {
      if (this.y > SOUTH_STOP + 20) {
        this.stopped = false; this.y += this.speed;
        if (this.y > H+70) this.y = -70; return;
      }
      let stopAt = SOUTH_STOP - CAR_H/2 - 3;
      if (frontEdgeY !== null) stopAt = Math.min(stopAt, frontEdgeY - CAR_H - CAR_GAP);
      if (shouldStop && this.y >= stopAt) { this.y = stopAt; this.stopped = true; }
      else { this.stopped = false; this.y += this.speed; if (this.y > H+70) this.y = -70; }
    } else {
      if (this.y < NORTH_STOP - 20) {
        this.stopped = false; this.y -= this.speed;
        if (this.y < -70) this.y = H+70; return;
      }
      let stopAt = NORTH_STOP + CAR_H/2 + 3;
      if (frontEdgeY !== null) stopAt = Math.max(stopAt, frontEdgeY + CAR_H + CAR_GAP);
      if (shouldStop && this.y <= stopAt) { this.y = stopAt; this.stopped = true; }
      else { this.stopped = false; this.y -= this.speed; if (this.y < -70) this.y = H+70; }
    }
  }

  draw(ctx) {
    const x = this.x - CAR_W/2, y = this.y - CAR_H/2;
    ctx.save(); ctx.globalAlpha = 0.35; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(this.x+2, this.y+5, CAR_W*0.44, CAR_H*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = this.color; ctx.beginPath(); ctx.roundRect(x, y, CAR_W, CAR_H, 5); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.roundRect(x+3, y+9, CAR_W-6, CAR_H-18, 3); ctx.fill();
    ctx.fillStyle = 'rgba(173,216,255,0.9)';
    if (this.direction==='south') ctx.fillRect(x+3, y+4, CAR_W-6, 8);
    else ctx.fillRect(x+3, y+CAR_H-12, CAR_W-6, 8);
    ctx.fillStyle = 'rgba(173,216,255,0.55)';
    if (this.direction==='south') ctx.fillRect(x+3, y+CAR_H-11, CAR_W-6, 6);
    else ctx.fillRect(x+3, y+6, CAR_W-6, 6);
    ctx.fillStyle = '#fffde7';
    if (this.direction==='south') { ctx.fillRect(x+2,y,4,3); ctx.fillRect(x+CAR_W-6,y,4,3); }
    else { ctx.fillRect(x+2,y+CAR_H-3,4,3); ctx.fillRect(x+CAR_W-6,y+CAR_H-3,4,3); }
    ctx.fillStyle = this.stopped ? '#ff1a1a' : '#7f0000';
    if (this.direction==='south') { ctx.fillRect(x+2,y+CAR_H-3,4,3); ctx.fillRect(x+CAR_W-6,y+CAR_H-3,4,3); }
    else { ctx.fillRect(x+2,y,4,3); ctx.fillRect(x+CAR_W-6,y,4,3); }
  }
}

/* ============================================================
   SCENE DRAWING
============================================================ */
function drawBuildingBlock(ctx, bx, by, bw, bh) {
  if (bw<=0||bh<=0) return;
  const buildings=[
    {rx:0.05,ry:0.05,rw:0.42,rh:0.55,c:'#1a2744'},
    {rx:0.52,ry:0.05,rw:0.43,rh:0.35,c:'#0f1e35'},
    {rx:0.05,ry:0.65,rw:0.30,rh:0.30,c:'#162038'},
    {rx:0.40,ry:0.45,rw:0.55,rh:0.50,c:'#0d1a2e'},
  ];
  buildings.forEach(b => {
    const x=bx+bw*b.rx, y=by+bh*b.ry, w=bw*b.rw, h=bh*b.rh;
    if (w<5||h<5) return;
    ctx.fillStyle=b.c; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='#1f2d3d'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
    ctx.fillStyle='rgba(255,240,150,0.3)';
    for (let wy=y+6; wy<y+h-8; wy+=14)
      for (let wx=x+6; wx<x+w-6; wx+=12)
        if ((Math.floor((wy-y)/14)+Math.floor((wx-x)/12))%3!==0)
          ctx.fillRect(wx, wy, 7, 8);
  });
}

function drawArrow(ctx, x, y, dir) {
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.beginPath();
  if (dir==='south') {
    ctx.moveTo(x,y+14); ctx.lineTo(x+7,y+4); ctx.lineTo(x+3,y+4);
    ctx.lineTo(x+3,y-10); ctx.lineTo(x-3,y-10); ctx.lineTo(x-3,y+4); ctx.lineTo(x-7,y+4);
  } else {
    ctx.moveTo(x,y-14); ctx.lineTo(x+7,y-4); ctx.lineTo(x+3,y-4);
    ctx.lineTo(x+3,y+10); ctx.lineTo(x-3,y+10); ctx.lineTo(x-3,y-4); ctx.lineTo(x-7,y-4);
  }
  ctx.closePath(); ctx.fill();
}

function drawLightHousing(ctx, hx, hy, hw, hh, light) {
  ctx.fillStyle='#1f2937'; ctx.beginPath(); ctx.roundRect(hx,hy,hw,hh,5); ctx.fill();
  ctx.strokeStyle='#374151'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(hx,hy,hw,hh,5); ctx.stroke();
  const defs=[
    {state:'red',    on:'#ef4444', off:'#450a0a'},
    {state:'yellow', on:'#f59e0b', off:'#3d2900'},
    {state:'green',  on:'#22c55e', off:'#052e16'},
  ];
  defs.forEach(({state, on, off}, i) => {
    const lx=hx+hw/2, ly=hy+14+i*24, r=9, active=(light===state);
    if (active) {
      const g=ctx.createRadialGradient(lx,ly,0,lx,ly,22);
      g.addColorStop(0, on+'aa'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(lx-22,ly-22,44,44);
    }
    ctx.beginPath(); ctx.arc(lx,ly,r,0,Math.PI*2);
    ctx.fillStyle=active?on:off; ctx.fill();
    if (active) {
      ctx.beginPath(); ctx.arc(lx-3,ly-3,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
    }
  });
}

function drawTrafficLight(ctx, x, y, light, position) {
  const isNW=position==='NW', hw=27, hh=75;
  ctx.fillStyle='#6b7280';
  if (isNW) {
    ctx.fillRect(x-4,y,8,42); ctx.fillRect(x-4,y,hw/2+8,6);
    drawLightHousing(ctx, x+4, y-hh, hw, hh, light);
  } else {
    ctx.fillRect(x-4,y-42,8,42); ctx.fillRect(x-hw/2-8,y-6,hw/2+8,6);
    drawLightHousing(ctx, x-4-hw, y-hh, hw, hh, light);
  }
}

function drawScene(ctx, light) {
  const blockW=CX-ROAD_HALF-SIDEWALK, blockH=CY-ROAD_HALF-SIDEWALK;
  ctx.fillStyle='#111827';
  ctx.fillRect(0,0,blockW,blockH);
  ctx.fillRect(CX+ROAD_HALF+SIDEWALK,0,W-CX-ROAD_HALF-SIDEWALK,blockH);
  ctx.fillRect(0,CY+ROAD_HALF+SIDEWALK,blockW,H-CY-ROAD_HALF-SIDEWALK);
  ctx.fillRect(CX+ROAD_HALF+SIDEWALK,CY+ROAD_HALF+SIDEWALK,W-CX-ROAD_HALF-SIDEWALK,H-CY-ROAD_HALF-SIDEWALK);
  drawBuildingBlock(ctx,0,0,blockW,blockH);
  drawBuildingBlock(ctx,CX+ROAD_HALF+SIDEWALK,0,W-CX-ROAD_HALF-SIDEWALK,blockH);
  drawBuildingBlock(ctx,0,CY+ROAD_HALF+SIDEWALK,blockW,H-CY-ROAD_HALF-SIDEWALK);
  drawBuildingBlock(ctx,CX+ROAD_HALF+SIDEWALK,CY+ROAD_HALF+SIDEWALK,W-CX-ROAD_HALF-SIDEWALK,H-CY-ROAD_HALF-SIDEWALK);
  ctx.fillStyle='#9ca3af';
  ctx.fillRect(CX-ROAD_HALF-SIDEWALK,0,SIDEWALK,CY-ROAD_HALF);
  ctx.fillRect(CX+ROAD_HALF,0,SIDEWALK,CY-ROAD_HALF);
  ctx.fillRect(CX-ROAD_HALF-SIDEWALK,CY+ROAD_HALF,SIDEWALK,H-CY-ROAD_HALF);
  ctx.fillRect(CX+ROAD_HALF,CY+ROAD_HALF,SIDEWALK,H-CY-ROAD_HALF);
  ctx.fillRect(0,CY-ROAD_HALF-SIDEWALK,CX-ROAD_HALF,SIDEWALK);
  ctx.fillRect(CX+ROAD_HALF,CY-ROAD_HALF-SIDEWALK,W-CX-ROAD_HALF,SIDEWALK);
  ctx.fillRect(0,CY+ROAD_HALF,CX-ROAD_HALF,SIDEWALK);
  ctx.fillRect(CX+ROAD_HALF,CY+ROAD_HALF,W-CX-ROAD_HALF,SIDEWALK);
  ctx.fillStyle='#374151';
  ctx.fillRect(CX-ROAD_HALF,0,ROAD_HALF*2,H);
  ctx.fillRect(0,CY-ROAD_HALF,W,ROAD_HALF*2);
  ctx.fillStyle='#3d4a5c';
  ctx.fillRect(CX-ROAD_HALF,CY-ROAD_HALF,ROAD_HALF*2,ROAD_HALF*2);
  ctx.fillStyle='#d1d5db';
  for (let i=0;i<4;i++) {
    const s=9,g=6;
    ctx.fillRect(CX-ROAD_HALF+5+i*(s+g),CY-ROAD_HALF-15,s,15);
    ctx.fillRect(CX-ROAD_HALF+5+i*(s+g),CY+ROAD_HALF,s,15);
    ctx.fillRect(CX-ROAD_HALF-15,CY-ROAD_HALF+5+i*(s+g),15,s);
    ctx.fillRect(CX+ROAD_HALF,CY-ROAD_HALF+5+i*(s+g),15,s);
  }
  ctx.strokeStyle='#fbbf24'; ctx.lineWidth=2; ctx.setLineDash([22,16]);
  ctx.beginPath();
  ctx.moveTo(CX,0); ctx.lineTo(CX,CY-ROAD_HALF);
  ctx.moveTo(CX,CY+ROAD_HALF); ctx.lineTo(CX,H);
  ctx.moveTo(0,CY); ctx.lineTo(CX-ROAD_HALF,CY);
  ctx.moveTo(CX+ROAD_HALF,CY); ctx.lineTo(W,CY);
  ctx.stroke(); ctx.setLineDash([]);
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(CX-ROAD_HALF+2,SOUTH_STOP); ctx.lineTo(CX-2,SOUTH_STOP);
  ctx.moveTo(CX+2,NORTH_STOP); ctx.lineTo(CX+ROAD_HALF-2,NORTH_STOP);
  ctx.stroke();
  drawArrow(ctx, CX-LANE_W*0.5, CY-ROAD_HALF-60, 'south');
  drawArrow(ctx, CX+LANE_W*0.5, CY+ROAD_HALF+60, 'north');
  drawTrafficLight(ctx, CX-ROAD_HALF-8, CY-ROAD_HALF, light, 'NW');
  drawTrafficLight(ctx, CX+ROAD_HALF+8, CY+ROAD_HALF, light, 'SE');
}

/* ============================================================
   CARS + ANIMATION
============================================================ */
const southCars=[new Car('south',0),new Car('south',1),new Car('south',2)];
const northCars=[new Car('north',0),new Car('north',1),new Car('north',2)];
const canvas=document.getElementById('sim');
const ctx=canvas.getContext('2d');

function animate() {
  ctx.clearRect(0,0,W,H);
  drawScene(ctx, currentLight);
  const south=[...southCars].sort((a,b)=>b.y-a.y);
  south.forEach((car,i)=>car.update(currentLight, i>0?south[i-1].y-CAR_H/2:null));
  const north=[...northCars].sort((a,b)=>a.y-b.y);
  north.forEach((car,i)=>car.update(currentLight, i>0?north[i-1].y+CAR_H/2:null));
  [...south,...north].forEach(car=>car.draw(ctx));
  requestAnimationFrame(animate);
}
animate();

/* ============================================================
   UI HELPERS
============================================================ */
const lightInfo = {
  red:    { emoji:'🔴', label:'RED',    color:'#ef4444', bg:'#1a0505' },
  yellow: { emoji:'🟡', label:'YELLOW', color:'#f59e0b', bg:'#1a1005' },
  green:  { emoji:'🟢', label:'GREEN',  color:'#22c55e', bg:'#051a0d' },
};

function updateUI(data) {
  const light = (data.north_south || 'red').toLowerCase();
  const li    = lightInfo[light] || lightInfo.red;

  document.getElementById('light-emoji').textContent        = li.emoji;
  document.getElementById('light-label').textContent        = li.label;
  document.getElementById('light-label').style.color       = li.color;
  document.getElementById('light-card').style.background   = li.bg;
  document.getElementById('light-card').style.borderColor  = li.color;
  document.getElementById('time-left').textContent         = data.duration ?? '--';
  document.getElementById('updated-at').textContent        = data.updated_at ?? 'N/A';

  if (light !== currentLight) {
    logEntries.unshift({ time: new Date().toLocaleTimeString(), state: light });
    if (logEntries.length > 5) logEntries.pop();
    renderLog();
  }

  currentLight = light;
  document.getElementById('badge').className = 'badge live';
  document.getElementById('badge-text').textContent = 'LIVE';
}

function renderLog() {
  const list = document.getElementById('log-list');
  if (logEntries.length === 0) {
    list.innerHTML = '<div class="log-empty">Waiting for light changes...</div>';
    return;
  }
  list.innerHTML = logEntries.map(e => `
    <div class="log-entry ${e.state}">
      <span class="dot ${e.state}"></span>
      <span class="log-time">${e.time}</span>
      <span class="log-state">${e.state.toUpperCase()}</span>
    </div>
  `).join('');
}

/* ============================================================
   FIREBASE REALTIME LISTENER
   This fires INSTANTLY whenever your ESP32 updates the DB!
   No polling — Firebase pushes the change to your browser.
============================================================ */
lightRef.on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    updateUI(data);
  } else {
    // First time setup — write default data to Firebase
    lightRef.set({
      north_south: 'red',
      duration:    30,
      updated_at:  new Date().toISOString()
    });
  }
}, (error) => {
  console.error('Firebase error:', error);
  document.getElementById('badge').className = 'badge offline';
  document.getElementById('badge-text').textContent = 'OFFLINE';
});
</script>
</body>
</html>
